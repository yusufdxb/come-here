behavior_node:
  ros__parameters:
    tick_rate_hz: 10.0
    direction_confidence_threshold: 0.5
    person_confidence_threshold: 0.5
    approach_stop_distance_m: 0.8
    search_timeout_s: 10.0
    approach_speed: 0.3
    lost_timeout_s: 3.0
    # SIT_AND_IDENTIFY sequence timing
    sit_settle_s: 1.0
    face_timeout_s: 1.5
    speak_hold_s: 5.0
    stand_settle_s: 0.5
    speak_text: "I am here"

go2_bridge_node:
  ros__parameters:
    cmd_z: 2.0
    deg_per_sec: 90.0
    sit_api_id: 1009   # Sit (haunches up, head up) — not 1005 StandDown (belly flat)
    stand_api_id: 1002
    move_api_id: 1008
    stop_move_api_id: 1003
    move_control_rate_hz: 10.0
    wav_dir: /home/unitree/come-here/come_here_audio/scripts
    wav_chunk_size_bytes: 16384
    wav_chunk_delay_s: 0.15
