behavior_node:
  ros__parameters:
    tick_rate_hz: 10.0
    direction_confidence_threshold: 0.5
    # ReSpeaker DOA (XMOS DSP) is dead — angle stuck in rear quadrant.
    # Skip TURN_TO_SOUND until firmware is fixed; LISTENING jumps to SEARCH_FOR_PERSON.
    skip_turn_to_sound: true
    person_confidence_threshold: 0.5
    approach_stop_distance_m: 0.8
    search_timeout_s: 10.0
    # mcf gait requires vx >= 0.5 m/s and a stable setpoint held for ~1 s+
    # to engage a clean trot. 0.5 is on the engagement floor; observed
    # intermittent shake-in-place when the gait failed to latch. 0.6 gives
    # margin without being so fast the robot overshoots stop distance.
    approach_speed: 0.6
    # Tightened 0.26 -> 0.15 rad (~8.6°) for precise ALIGN convergence.
    # With the previous 15° deadband + ~1.0 rad/s yaw, ALIGN committed to WALK
    # before actually facing the person, producing "rotate left, walk past".
    approach_align_threshold_rad: 0.15
    # Lowered yaw rates 1.0/1.2 -> 0.6/0.6 rad/s so min_align_s = 0.4 s gives
    # ~0.24 rad per ALIGN commit instead of 0.4/0.48 rad — less overshoot.
    approach_ccw_yaw: 0.6
    approach_cw_yaw: 0.6
    approach_min_align_s: 0.4
    approach_min_walk_s: 1.5
    # EMA alpha on YOLO bbox-center bearing (blocker #2). 0.3 damps the
    # observed ±0.6 rad frame-to-frame jitter without over-lagging real turns.
    bearing_ema_alpha: 0.3
    lost_timeout_s: 3.0
    # SIT_AND_IDENTIFY sequence timing
    sit_settle_s: 1.0
    face_timeout_s: 1.5
    speak_hold_s: 5.0
    stand_settle_s: 0.5
    speak_text: "I am here"

go2_bridge_node:
  ros__parameters:
    cmd_z: 2.0
    deg_per_sec: 90.0
    sit_api_id: 1009   # Sit (haunches up, head up) — not 1005 StandDown (belly flat)
    stand_api_id: 1002
    move_api_id: 1008
    stop_move_api_id: 1003
    move_control_rate_hz: 10.0
    wav_dir: /home/unitree/come-here/come_here_audio/scripts
    wav_chunk_size_bytes: 16384
    wav_chunk_delay_s: 0.15
